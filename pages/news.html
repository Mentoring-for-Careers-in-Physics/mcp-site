<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="News and announcements from Mentoring for Careers in Physics." />
  <title>News | MCP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/mcp-shared.css" />
  <script src="../js/mcp-subpages.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<script type="text/babel">
const { useEffect, useState } = React;
const {
  DEFAULT_EXTERNAL_LINKS,
  buildExternalLinks,
  buildNewsFeed,
  loadJson,
  socialLabel,
} = window.MCPSubpages;

const ROOT = "..";
const NAV_LINKS = [
  { label:"Home", href:"../index.html" },
  { label:"Mentors", href:"./mentors.html" },
  { label:"Industry", href:"./industry.html" },
  { label:"Leadership", href:"./team.html" },
  { label:"News", href:"./news.html" },
  { label:"Contact", href:"./contact.html" },
];
const CURRENT_YEAR = new Date().getFullYear();

function articleResourceLinks(article) {
  if (Array.isArray(article?.resourceLinks) && article.resourceLinks.length) {
    return article.resourceLinks
      .filter((item) => item?.url)
      .map((item) => ({
        label: item.label || socialLabel(item.url),
        url: item.url,
      }));
  }

  return (article?.externalLinks || []).map((url) => ({
    label: socialLabel(url),
    url,
  }));
}

function Nav({ links }) {
  const [open, setOpen] = useState(false);
  return (
    <>
      <nav className="nav">
        <div className="nav-inner">
          <a className="brand" href="../index.html">
            <div className="brand-mark">MCP</div>
            <div className="brand-text"><strong>Mentoring for Careers in Physics</strong><small>William &amp; Mary</small></div>
          </a>
          <div className="nav-links">
            {NAV_LINKS.map((link) => <a key={link.label} className={`nav-link${link.label==="News" ? " active" : ""}`} href={link.href}>{link.label}</a>)}
          </div>
          <div className="nav-actions">
            <a className="nav-join" href={links.mentee} target="_blank" rel="noreferrer">Join</a>
            <a className="nav-give" href={links.giving} target="_blank" rel="noreferrer">Give</a>
            <button className="nav-hamburger" onClick={() => setOpen((value) => !value)} aria-label="Menu">
              <svg width="18" height="14" viewBox="0 0 18 14" fill="none"><rect width="18" height="2" rx="1" fill="currentColor"/><rect y="6" width="18" height="2" rx="1" fill="currentColor"/><rect y="12" width="18" height="2" rx="1" fill="currentColor"/></svg>
            </button>
          </div>
        </div>
      </nav>
      <div className={`nav-mobile ${open ? "open" : ""}`}>
        {NAV_LINKS.map((link) => <a key={link.label} href={link.href} onClick={() => setOpen(false)}>{link.label}</a>)}
        <div className="nav-mobile-actions">
          <a className="btn btn-ghost btn-sm" href={links.mentee} target="_blank" rel="noreferrer">Join</a>
          <a className="btn btn-primary btn-sm" href={links.giving} target="_blank" rel="noreferrer">Give</a>
        </div>
      </div>
    </>
  );
}

function ArticleModal({ article, onClose }) {
  const resourceLinks = articleResourceLinks(article);
  const imageFit = article.imageFit === "contain" ? "contain" : "cover";
  const imageBackground = article.imageBackground || "var(--blush)";

  useEffect(() => {
    const handleKey = (event) => {
      if (event.key === "Escape") {
        onClose();
      }
    };

    document.addEventListener("keydown", handleKey);
    document.body.style.overflow = "hidden";
    return () => {
      document.removeEventListener("keydown", handleKey);
      document.body.style.overflow = "";
    };
  }, [onClose]);

  return (
    <div className="modal-overlay" onClick={(event) => event.target === event.currentTarget && onClose()}>
      <div className="modal-box">
        <div className="modal-close-row"><button className="modal-close-btn" onClick={onClose}>Close ✕</button></div>
        <div className="modal-header" style={{ gridTemplateColumns:"1fr" }}>
          {article.image
            ? <img className="modal-img" src={article.image} alt={article.title} style={{ aspectRatio:"1.8", objectFit:imageFit, objectPosition:"center 35%", background:imageBackground, padding:imageFit === "contain" ? "1rem" : undefined }} />
            : <div className="modal-img" style={{ aspectRatio:"1.8", background:"linear-gradient(160deg,var(--blush),var(--rose))" }} />
          }
          <div className="modal-header-info" style={{ gap:"0.7rem" }}>
            <span className="kicker">Program Update</span>
            <h2 style={{ fontSize:"clamp(1.4rem,3vw,2rem)", lineHeight:1.05 }}>{article.title}</h2>
            <p style={{ fontSize:"0.82rem", color:"var(--muted)" }}>{article.formattedDate}</p>
          </div>
        </div>
        <div className="modal-body">
          {article.paragraphs.length
            ? article.paragraphs.map((paragraph, index) => <p key={index} className="modal-bio">{paragraph}</p>)
            : <p className="modal-bio">Full article text coming soon.</p>
          }
          {resourceLinks.length ? (
            <div className="modal-actions">
              {resourceLinks.map((link) => (
                <a key={link.url} className="btn btn-secondary btn-sm" href={link.url} target="_blank" rel="noreferrer noopener">{link.label} →</a>
              ))}
            </div>
          ) : null}
        </div>
      </div>
    </div>
  );
}

function Footer({ links }) {
  return (
    <footer className="footer">
      <div className="shell">
        <div className="footer-grid">
          <div>
            <a className="brand" href="../index.html" style={{ marginBottom:"0.9rem", display:"inline-flex" }}>
              <div className="brand-mark">MCP</div>
              <div className="brand-text"><strong>Mentoring for Careers in Physics</strong><small>William &amp; Mary</small></div>
            </a>
            <p style={{ fontSize:"0.88rem", color:"var(--muted)", lineHeight:1.65, maxWidth:"28ch", marginTop:"0.75rem" }}>Connecting undergraduate students with accomplished mentors across research, industry, and government.</p>
          </div>
          <div><div className="footer-heading">Explore</div><div className="footer-links">{NAV_LINKS.map((link) => <a key={link.label} href={link.href}>{link.label}</a>)}</div></div>
          <div><div className="footer-heading">Get involved</div><div className="footer-links"><a href={links.mentee} target="_blank" rel="noreferrer">Join as a student</a><a href={links.mentor}>Become a mentor</a><a href={links.giving} target="_blank" rel="noreferrer">Give to MCP</a></div></div>
          <div><div className="footer-heading">Connect</div><div className="footer-links"><a href={links.linkedin} target="_blank" rel="noreferrer">LinkedIn</a><a href={links.instagram} target="_blank" rel="noreferrer">Instagram</a><a href={`mailto:${links.email}`}>{links.email}</a></div></div>
        </div>
        <div className="footer-base"><p>Mentoring for Careers in Physics · William &amp; Mary</p><p>© {CURRENT_YEAR} William &amp; Mary</p></div>
      </div>
    </footer>
  );
}

function NewsCard({ article, onOpen }) {
  const imageFit = article.imageFit === "contain" ? "contain" : "cover";
  const imageBackground = article.imageBackground || "var(--blush)";

  return (
    <div className="news-card" role="button" tabIndex={0} onClick={() => onOpen(article)} onKeyDown={(event) => event.key === "Enter" && onOpen(article)}>
      <div className="news-thumb">
        {article.image
          ? <img src={article.image} alt={article.title} style={{ width:"100%", height:"100%", objectFit:imageFit, background:imageBackground, padding:imageFit === "contain" ? "0.85rem" : undefined }} />
          : <div style={{ width:"100%", height:"100%", background:"linear-gradient(160deg,var(--blush),var(--rose))", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <span style={{ fontFamily:"var(--f-display)", fontSize:"1rem", color:"var(--wine)", opacity:0.4, textTransform:"uppercase", letterSpacing:"0.1em" }}>MCP</span>
            </div>
        }
      </div>
      <div className="news-body">
        <div className="news-date">{article.formattedDate}</div>
        <div className="news-title">{article.title}</div>
        <div className="news-summary">{article.summary}</div>
        <div style={{ marginTop:"1rem", fontSize:"0.78rem", fontWeight:600, color:"var(--wine)" }}>Read update →</div>
      </div>
    </div>
  );
}

function App() {
  const [links, setLinks] = useState(DEFAULT_EXTERNAL_LINKS);
  const [news, setNews] = useState([]);
  const [status, setStatus] = useState({ loading:true, error:"" });
  const [modal, setModal] = useState(null);

  useEffect(() => {
    let active = true;

    async function loadPage() {
      try {
        const [site, newsItems] = await Promise.all([
          loadJson("site.json", ROOT),
          loadJson("news.json", ROOT),
        ]);

        if (!active) {
          return;
        }

        setLinks(buildExternalLinks(site));
        setNews(buildNewsFeed(newsItems, ROOT));
        setStatus({ loading:false, error:"" });
      } catch (error) {
        if (!active) {
          return;
        }

        setStatus({ loading:false, error:"Could not load the news archive right now." });
      }
    }

    loadPage();
    return () => {
      active = false;
    };
  }, []);

  useEffect(() => {
    if (!news.length) {
      return undefined;
    }

    const syncModalToHash = () => {
      const articleId = window.location.hash.replace(/^#/, "");

      if (!articleId) {
        setModal(null);
        return;
      }

      const matchedArticle = news.find((article) => article.id === articleId);
      if (matchedArticle) {
        setModal(matchedArticle);
      }
    };

    syncModalToHash();
    window.addEventListener("hashchange", syncModalToHash);
    return () => {
      window.removeEventListener("hashchange", syncModalToHash);
    };
  }, [news]);

  const openArticle = (article) => {
    setModal(article);
    if (article?.id) {
      window.history.replaceState(null, "", `#${article.id}`);
    }
  };

  const closeArticle = () => {
    setModal(null);
    const baseUrl = `${window.location.pathname}${window.location.search}`;
    window.history.replaceState(null, "", baseUrl);
  };

  const featured = news[0];
  const archive = news.slice(1);
  const yearRange = news.length ? `${news[news.length - 1].year}–${news[0].year}` : "";

  return (
    <>
      <Nav links={links} />
      <main>
        <section className="page-hero">
          <div className="shell">
            <div className="page-hero-grid">
              <div>
                <span className="kicker">Program Updates</span>
                <h1>News &amp; announcements.</h1>
                <p style={{ fontSize:"1rem", color:"var(--muted)", lineHeight:1.7, maxWidth:"46ch", marginTop:"1rem" }}>This page now pulls from the full MCP news archive so the latest and historical updates stay in sync with the shared data files.</p>
              </div>
              <div className="hero-stat-card">
                <span className="kicker">Archive</span>
                <div className="metric"><strong>{news.length}</strong><span>Total updates</span></div>
                <div className="metric"><strong>{yearRange || "—"}</strong><span>Archive range</span></div>
              </div>
            </div>
          </div>
        </section>

        <section className="section">
          <div className="shell">
            {status.loading ? (
              <div className="empty-state">Loading program updates…</div>
            ) : status.error ? (
              <div className="empty-state">{status.error}</div>
            ) : featured ? (
              <>
                <div role="button" tabIndex={0} onClick={() => openArticle(featured)} onKeyDown={(event) => event.key === "Enter" && openArticle(featured)} style={{ borderRadius:"var(--r-xl)", overflow:"hidden", border:"1px solid var(--border)", background:"white", boxShadow:"0 12px 36px rgba(74,53,64,0.07)", display:"grid", gridTemplateColumns:"1fr 1fr", marginBottom:"2rem", cursor:"pointer" }}>
                  <div style={{ overflow:"hidden", background:"var(--blush)" }}>
                    {featured.image
                      ? <img src={featured.image} alt={featured.title} style={{ width:"100%", height:"100%", objectFit:featured.imageFit === "contain" ? "contain" : "cover", objectPosition:"center 30%", background:featured.imageBackground || "var(--blush)", padding:featured.imageFit === "contain" ? "1rem" : undefined }} />
                      : <div style={{ width:"100%", height:"100%", background:"linear-gradient(160deg,var(--blush),var(--rose))" }} />
                    }
                  </div>
                  <div style={{ padding:"2.5rem" }}>
                    <div style={{ fontSize:"0.78rem", color:"var(--muted)", marginBottom:"1rem" }}>{featured.formattedDate}</div>
                    <h2 style={{ marginBottom:"1rem", lineHeight:1.05 }}>{featured.title}</h2>
                    <p style={{ fontSize:"0.95rem", color:"var(--muted)", lineHeight:1.7 }}>{featured.summary}</p>
                    <div style={{ marginTop:"1.25rem", fontSize:"0.82rem", fontWeight:600, color:"var(--wine)" }}>Read featured update →</div>
                  </div>
                </div>

                <div className="section-head">
                  <div><span className="kicker">Archive</span><h2>All MCP updates.</h2></div>
                </div>
                <div className="news-grid">
                  {archive.map((article) => <NewsCard key={article.id} article={article} onOpen={openArticle} />)}
                </div>
              </>
            ) : (
              <div className="empty-state">No news items are available yet.</div>
            )}
          </div>
        </section>
      </main>
      <Footer links={links} />
      {modal ? <ArticleModal article={modal} onClose={closeArticle} /> : null}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
