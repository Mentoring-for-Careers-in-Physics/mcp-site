<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Mentor directory for Mentoring for Careers in Physics." />
  <title>Mentors | MCP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/mcp-shared.css" />
  <script src="../js/mcp-subpages.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<script type="text/babel">
const { useEffect, useMemo, useState } = React;
const {
  DEFAULT_EXTERNAL_LINKS,
  buildExternalLinks,
  buildMentorDirectory,
  buildSocialLinks,
  loadJson,
  monogram,
  socialIconMarkup,
} = window.MCPSubpages;

const ROOT = "..";
const FILTER_ORDER = ["All", "Industry", "Government", "National Lab", "Academia", "Independent"];
const NAV_LINKS = [
  { label:"Home", href:"../index.html" },
  { label:"Mentors", href:"./mentors.html" },
  { label:"Industry", href:"./industry.html" },
  { label:"Leadership", href:"./team.html" },
  { label:"News", href:"./news.html" },
  { label:"Friends", href:"../index.html#friends" },
  { label:"Contact", href:"./contact.html" },
];
const CURRENT_YEAR = new Date().getFullYear();

function Nav({ links }) {
  const [open, setOpen] = useState(false);
  return (
    <>
      <nav className="nav">
        <div className="nav-inner">
          <a className="brand" href="../index.html">
            <div className="brand-mark">MCP</div>
            <div className="brand-text"><strong>Mentoring for Careers in Physics</strong><small>William &amp; Mary</small></div>
          </a>
          <div className="nav-links">
            {NAV_LINKS.map((link) => <a key={link.label} className={`nav-link${link.label==="Mentors" ? " active" : ""}`} href={link.href}>{link.label}</a>)}
          </div>
          <div className="nav-actions">
            <a className="nav-join" href={links.mentee} target="_blank" rel="noreferrer">Join</a>
            <a className="nav-give" href={links.giving} target="_blank" rel="noreferrer">Give</a>
            <button className="nav-hamburger" onClick={() => setOpen((value) => !value)} aria-label="Menu">
              <svg width="18" height="14" viewBox="0 0 18 14" fill="none"><rect width="18" height="2" rx="1" fill="currentColor"/><rect y="6" width="18" height="2" rx="1" fill="currentColor"/><rect y="12" width="18" height="2" rx="1" fill="currentColor"/></svg>
            </button>
          </div>
        </div>
      </nav>
      <div className={`nav-mobile ${open ? "open" : ""}`}>
        {NAV_LINKS.map((link) => <a key={link.label} href={link.href} onClick={() => setOpen(false)}>{link.label}</a>)}
        <div className="nav-mobile-actions">
          <a className="btn btn-ghost btn-sm" href={links.mentee} target="_blank" rel="noreferrer">Join</a>
          <a className="btn btn-primary btn-sm" href={links.giving} target="_blank" rel="noreferrer">Give</a>
        </div>
      </div>
    </>
  );
}

function MentorModal({ mentor, onClose }) {
  useEffect(() => {
    const handleKey = (event) => {
      if (event.key === "Escape") {
        onClose();
      }
    };

    document.addEventListener("keydown", handleKey);
    document.body.style.overflow = "hidden";
    return () => {
      document.removeEventListener("keydown", handleKey);
      document.body.style.overflow = "";
    };
  }, [onClose]);

  const linkedCompanies = mentor.companies.filter((company) => company.website);

  return (
    <div className="modal-overlay" onClick={(event) => event.target === event.currentTarget && onClose()}>
      <div className="modal-box">
        <div className="modal-close-row"><button className="modal-close-btn" onClick={onClose}>Close ✕</button></div>
        <div className="modal-header">
          {mentor.image
            ? <img className="modal-img" src={mentor.image} alt={mentor.name} />
            : <div className="modal-img" style={{ background:"var(--blush)", display:"flex", alignItems:"center", justifyContent:"center" }}>
                <span style={{ fontFamily:"var(--f-display)", fontSize:"3rem", color:"var(--wine)", opacity:0.3 }}>{monogram(mentor.name)}</span>
              </div>
          }
          <div className="modal-header-info">
            <span className="kicker">{mentor.sectorLabel}</span>
            <h2 style={{ fontSize:"clamp(1.4rem,3vw,2rem)" }}>{mentor.name}</h2>
            <p style={{ fontSize:"0.88rem", color:"var(--wine-mid)", fontWeight:500 }}>{mentor.title}</p>
            <div style={{ display:"flex", flexWrap:"wrap", gap:"0.45rem", marginTop:"0.35rem" }}>
              {mentor.organizations.map((organization) => (
                <span key={organization} style={{ fontSize:"0.78rem", background:"white", color:"var(--wine)", border:"1px solid var(--border)", padding:"0.28rem 0.65rem", borderRadius:"999px", fontWeight:500 }}>{organization}</span>
              ))}
            </div>
          </div>
        </div>
        <div className="modal-body">
          <p className="modal-bio">{mentor.bio || "Full biography coming soon."}</p>
          <div className="modal-actions">
            {mentor.linkedin ? (
              <a className="btn btn-primary btn-sm social-action-link" href={mentor.linkedin} target="_blank" rel="noreferrer noopener">
                <span className="social-link__icon" aria-hidden="true" dangerouslySetInnerHTML={{ __html: socialIconMarkup(mentor.linkedin) }} />
                <span>LinkedIn</span>
                <span aria-hidden="true">→</span>
              </a>
            ) : null}
            {linkedCompanies.map((company) => (
              <a key={company.name} className="btn btn-secondary btn-sm" href={company.website} target="_blank" rel="noreferrer noopener">Visit {company.name} →</a>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function Footer({ links }) {
  return (
    <footer className="footer">
      <div className="shell">
        <div className="footer-grid">
          <div>
            <a className="brand" href="../index.html" style={{ marginBottom:"0.9rem", display:"inline-flex" }}>
              <div className="brand-mark">MCP</div>
              <div className="brand-text"><strong>Mentoring for Careers in Physics</strong><small>William &amp; Mary</small></div>
            </a>
            <p style={{ fontSize:"0.88rem", color:"var(--muted)", lineHeight:1.65, maxWidth:"28ch", marginTop:"0.75rem" }}>Connecting undergraduate students with accomplished mentors across research, industry, and government.</p>
          </div>
          <div><div className="footer-heading">Explore</div><div className="footer-links">{NAV_LINKS.map((link) => <a key={link.label} href={link.href}>{link.label}</a>)}</div></div>
          <div><div className="footer-heading">Get involved</div><div className="footer-links"><a href={links.mentee} target="_blank" rel="noreferrer">Join as a student</a><a href={links.mentor}>Become a mentor</a><a href={links.giving} target="_blank" rel="noreferrer">Give to MCP</a></div></div>
          <div><div className="footer-heading">Connect</div><div className="footer-links"><div className="social-list social-list--footer" dangerouslySetInnerHTML={{ __html: buildSocialLinks(links.socialLinks) }} /><a href={`mailto:${links.email}`}>{links.email}</a></div></div>
        </div>
        <div className="footer-base"><p>Mentoring for Careers in Physics · William &amp; Mary</p><p>© {CURRENT_YEAR} William &amp; Mary</p></div>
      </div>
    </footer>
  );
}

function MentorCard({ mentor, onOpen }) {
  return (
    <div className="profile-card" onClick={() => onOpen(mentor)} role="button" tabIndex={0} onKeyDown={(event) => event.key === "Enter" && onOpen(mentor)}>
      <div className="profile-photo" style={{ aspectRatio:"0.85" }}>
        {mentor.image
          ? <img src={mentor.image} alt={mentor.name} />
          : <div style={{ width:"100%", height:"100%", background:"linear-gradient(160deg,var(--blush),var(--rose))", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <span style={{ fontFamily:"var(--f-display)", fontSize:"3.5rem", color:"var(--wine)", opacity:0.25 }}>{monogram(mentor.name)}</span>
            </div>
        }
      </div>
      <div className="profile-body">
        <div className="profile-sector">{mentor.sectorLabel} · {mentor.organizationLabel}</div>
        <div className="profile-name">{mentor.name}</div>
        <div className="profile-role">{mentor.title}</div>
        <p style={{ fontSize:"0.86rem", color:"var(--muted)", lineHeight:1.6, marginTop:"0.65rem" }}>{mentor.excerpt}</p>
        <div className="profile-hint">View full profile{mentor.linkedin ? " & LinkedIn" : ""} →</div>
      </div>
    </div>
  );
}

function App() {
  const [query, setQuery] = useState("");
  const [filter, setFilter] = useState("All");
  const [directory, setDirectory] = useState([]);
  const [modal, setModal] = useState(null);
  const [links, setLinks] = useState(DEFAULT_EXTERNAL_LINKS);
  const [status, setStatus] = useState({ loading:true, error:"" });

  useEffect(() => {
    let active = true;

    async function loadPage() {
      try {
        const [site, mentors, companies] = await Promise.all([
          loadJson("site.json", ROOT),
          loadJson("mentors.json", ROOT),
          loadJson("companies.json", ROOT),
        ]);

        if (!active) {
          return;
        }

        setLinks(buildExternalLinks(site));
        setDirectory(buildMentorDirectory(mentors, companies, ROOT));
        setStatus({ loading:false, error:"" });
      } catch (error) {
        if (!active) {
          return;
        }

        setStatus({ loading:false, error:"Could not load the mentor directory right now." });
      }
    }

    loadPage();
    return () => {
      active = false;
    };
  }, []);

  const availableFilters = useMemo(
    () => FILTER_ORDER.filter((sector) => sector === "All" || directory.some((mentor) => mentor.sectors.includes(sector))),
    [directory],
  );

  const filtered = useMemo(() => {
    const normalizedQuery = query.trim().toLowerCase();
    return directory.filter((mentor) => {
      const matchesQuery =
        !normalizedQuery ||
        mentor.name.toLowerCase().includes(normalizedQuery) ||
        mentor.title.toLowerCase().includes(normalizedQuery) ||
        mentor.organizations.join(" ").toLowerCase().includes(normalizedQuery) ||
        mentor.bio.toLowerCase().includes(normalizedQuery);
      const matchesFilter = filter === "All" || mentor.sectors.includes(filter);
      return matchesQuery && matchesFilter;
    });
  }, [directory, filter, query]);

  const linkedInCount = directory.filter((mentor) => mentor.linkedin).length;
  const organizationCount = new Set(directory.flatMap((mentor) => mentor.organizations)).size;

  return (
    <>
      <Nav links={links} />
      <main>
        <section className="page-hero">
          <div className="shell">
            <div className="page-hero-grid">
              <div>
                <span className="kicker">Mentor Directory</span>
                <h1>Meet every mentor.</h1>
                <p style={{ fontSize:"1rem", color:"var(--muted)", lineHeight:1.7, maxWidth:"46ch", marginTop:"1rem" }}>This page now pulls from the full MCP mentor dataset, including the full organization matches and every currently tracked mentor profile.</p>
              </div>
              <div className="hero-stat-card">
                <span className="kicker">Directory</span>
                <div className="metric"><strong>{directory.length}</strong><span>Total mentors</span></div>
                <div className="metric"><strong>{linkedInCount}</strong><span>LinkedIn profiles</span></div>
                <div className="metric"><strong>{organizationCount}</strong><span>Organizations represented</span></div>
              </div>
            </div>
          </div>
        </section>

        <section className="section">
          <div className="shell">
            {status.loading ? (
              <div className="empty-state">Loading mentor profiles…</div>
            ) : status.error ? (
              <div className="empty-state">{status.error}</div>
            ) : (
              <>
                <input className="search-bar" type="search" placeholder="Search by name, role, organization, or keyword…" value={query} onChange={(event) => setQuery(event.target.value)} />
                <div className="filter-row">
                  {availableFilters.map((sector) => <button key={sector} className={`filter-chip${filter===sector ? " active" : ""}`} onClick={() => setFilter(sector)}>{sector}</button>)}
                </div>
                {filtered.length ? (
                  <div className="profile-grid">
                    {filtered.map((mentor) => <MentorCard key={mentor.name} mentor={mentor} onOpen={setModal} />)}
                  </div>
                ) : (
                  <div className="empty-state">No mentors match your search. Try a different keyword or filter.</div>
                )}
              </>
            )}
          </div>
        </section>
      </main>
      <Footer links={links} />
      {modal ? <MentorModal mentor={modal} onClose={() => setModal(null)} /> : null}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
