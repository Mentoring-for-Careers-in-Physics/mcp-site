<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Videos from Mentoring for Careers in Physics." />
  <title>Videos | MCP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/mcp-shared.css" />
  <script src="../js/mcp-subpages.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<script type="text/babel">
const { useEffect, useMemo, useState } = React;
const {
  DEFAULT_EXTERNAL_LINKS,
  assetPath,
  buildExternalLinks,
  buildSocialLinks,
  formatDate,
  loadJson,
  rootPath,
} = window.MCPSubpages;

const ROOT = "..";
const NAV_LINKS = [
  { label:"Home", href:"../index.html" },
  { label:"Mentors", href:"./mentors.html" },
  { label:"Industry", href:"./industry.html" },
  { label:"Leadership", href:"./team.html" },
  { label:"News", href:"./news.html" },
  { label:"Videos", href:"./videos.html" },
  { label:"Friends", href:"../index.html#friends" },
  { label:"Contact", href:"./contact.html" },
];
const CURRENT_YEAR = new Date().getFullYear();

function sortVideos(videos) {
  return [...(videos || [])].sort((left, right) => new Date(right.date) - new Date(left.date));
}

function normalizeVideo(video) {
  return {
    ...video,
    thumbnail: assetPath(video.thumbnail, ROOT),
    dateLabel: video.displayDate || formatDate(video.date),
    relatedHref: video.relatedPage ? rootPath(video.relatedPage, ROOT) : "",
  };
}

function Nav({ links }) {
  const [open, setOpen] = useState(false);
  return (
    <>
      <nav className="nav">
        <div className="nav-inner">
          <a className="brand" href="../index.html">
            <div className="brand-mark">MCP</div>
            <div className="brand-text"><strong>Mentoring for Careers in Physics</strong><small>William &amp; Mary</small></div>
          </a>
          <div className="nav-links">
            {NAV_LINKS.map((link) => <a key={link.label} className={`nav-link${link.label==="Videos" ? " active" : ""}`} href={link.href}>{link.label}</a>)}
          </div>
          <div className="nav-actions">
            <a className="nav-join" href={links.mentee} target="_blank" rel="noreferrer">Join</a>
            <a className="nav-give" href={links.giving} target="_blank" rel="noreferrer">Give</a>
            <button className="nav-hamburger" onClick={() => setOpen((value) => !value)} aria-label="Menu">
              <svg width="18" height="14" viewBox="0 0 18 14" fill="none"><rect width="18" height="2" rx="1" fill="currentColor"/><rect y="6" width="18" height="2" rx="1" fill="currentColor"/><rect y="12" width="18" height="2" rx="1" fill="currentColor"/></svg>
            </button>
          </div>
        </div>
      </nav>
      <div className={`nav-mobile ${open ? "open" : ""}`}>
        {NAV_LINKS.map((link) => <a key={link.label} href={link.href} onClick={() => setOpen(false)}>{link.label}</a>)}
        <div className="nav-mobile-actions">
          <a className="btn btn-ghost btn-sm" href={links.mentee} target="_blank" rel="noreferrer">Join</a>
          <a className="btn btn-primary btn-sm" href={links.giving} target="_blank" rel="noreferrer">Give</a>
        </div>
      </div>
    </>
  );
}

function Footer({ links }) {
  return (
    <footer className="footer">
      <div className="shell">
        <div className="footer-grid">
          <div>
            <a className="brand" href="../index.html" style={{ marginBottom:"0.9rem", display:"inline-flex" }}>
              <div className="brand-mark">MCP</div>
              <div className="brand-text"><strong>Mentoring for Careers in Physics</strong><small>William &amp; Mary</small></div>
            </a>
            <p style={{ fontSize:"0.88rem", color:"var(--muted)", lineHeight:1.65, maxWidth:"28ch", marginTop:"0.75rem" }}>Connecting undergraduate students with accomplished mentors across research, industry, and government.</p>
          </div>
          <div><div className="footer-heading">Explore</div><div className="footer-links">{NAV_LINKS.map((link) => <a key={link.label} href={link.href}>{link.label}</a>)}</div></div>
          <div><div className="footer-heading">Get involved</div><div className="footer-links"><a href={links.mentee} target="_blank" rel="noreferrer">Join as a student</a><a href={links.mentor}>Become a mentor</a><a href={links.giving} target="_blank" rel="noreferrer">Give to MCP</a></div></div>
          <div><div className="footer-heading">Connect</div><div className="footer-links"><div className="social-list social-list--footer" dangerouslySetInnerHTML={{ __html: buildSocialLinks(links.socialLinks) }} /><a href={`mailto:${links.email}`}>{links.email}</a></div></div>
        </div>
        <div className="footer-base"><p>Mentoring for Careers in Physics · William &amp; Mary</p><p>© {CURRENT_YEAR} William &amp; Mary</p></div>
      </div>
    </footer>
  );
}

function VideoEmbed({ video }) {
  return (
    <iframe
      src={video.embedUrl}
      title={video.title}
      loading="lazy"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerPolicy="strict-origin-when-cross-origin"
      allowFullScreen>
    </iframe>
  );
}

function VideoActions({ video }) {
  return (
    <div className="section-actions">
      <a className="btn btn-primary btn-sm" href={video.watchUrl} target="_blank" rel="noreferrer">Watch on {video.provider}</a>
      {video.relatedHref ? <a className="text-link" href={video.relatedHref}>Related news →</a> : null}
    </div>
  );
}

function FeaturedVideo({ video }) {
  if (!video) {
    return <div className="empty-state">Videos will appear here soon.</div>;
  }

  return (
    <div className="video-feature video-feature--page">
      <div className="video-copy">
        <span className="kicker">Latest Video</span>
        <h2>{video.title}</h2>
        <p>{video.description}</p>
        <div className="chip-row">
          <span className="chip">{video.dateLabel}</span>
          <span className="chip chip--soft">{video.category}</span>
        </div>
        <VideoActions video={video} />
      </div>
      <div className="video-frame" aria-label={video.title}>
        <VideoEmbed video={video} />
      </div>
    </div>
  );
}

function VideoCard({ video }) {
  return (
    <article className="video-card">
      <div className="video-card__media">
        <VideoEmbed video={video} />
      </div>
      <div className="video-card__body">
        <div className="news-date">{video.dateLabel} · {video.provider}</div>
        <h3 className="news-title">{video.title}</h3>
        <p className="news-summary">{video.description}</p>
        <div className="chip-row">
          <span className="chip chip--soft">{video.category}</span>
        </div>
        <VideoActions video={video} />
      </div>
    </article>
  );
}

function App() {
  const [links, setLinks] = useState(DEFAULT_EXTERNAL_LINKS);
  const [videos, setVideos] = useState([]);
  const [status, setStatus] = useState({ loading:true, error:"" });

  useEffect(() => {
    let active = true;

    async function loadPage() {
      try {
        const [siteData, videoData] = await Promise.all([
          loadJson("site.json", ROOT),
          loadJson("videos.json", ROOT),
        ]);

        if (!active) {
          return;
        }

        setLinks(buildExternalLinks(siteData));
        setVideos(sortVideos(videoData).map(normalizeVideo));
        setStatus({ loading:false, error:"" });
      } catch (error) {
        if (!active) {
          return;
        }
        setStatus({ loading:false, error:"Unable to load videos right now." });
      }
    }

    loadPage();
    return () => {
      active = false;
    };
  }, []);

  const featured = videos[0] || null;
  const archive = useMemo(() => videos.slice(1), [videos]);

  return (
    <>
      <Nav links={links} />
      <main>
        <section className="page-hero">
          <div className="shell page-hero-grid">
            <div>
              <span className="kicker">MCP Videos</span>
              <h1>Stories, events, and program updates.</h1>
              <p style={{ fontSize:"1rem", color:"var(--muted)", lineHeight:1.7, maxWidth:"52ch", marginTop:"1rem" }}>A home for MCP videos from launch moments, program highlights, events, and giving initiatives.</p>
            </div>
            <div className="hero-stat-card">
              <div className="metric"><strong>{videos.length || "0"}</strong><span>Videos</span></div>
              <div className="metric"><strong>{featured?.provider || "MCP"}</strong><span>Latest source</span></div>
            </div>
          </div>
        </section>

        <section className="section section-soft">
          <div className="shell">
            {status.loading ? (
              <div className="empty-state">Loading videos...</div>
            ) : status.error ? (
              <div className="empty-state">{status.error}</div>
            ) : (
              <>
                <FeaturedVideo video={featured} />
                <div className="section-head section-head--video-archive">
                  <div><span className="kicker">Archive</span><h2>All MCP videos.</h2></div>
                </div>
                <div className="video-grid">
                  {archive.map((video) => <VideoCard key={video.id} video={video} />)}
                </div>
              </>
            )}
          </div>
        </section>
      </main>
      <Footer links={links} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
