<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Partner organizations for Mentoring for Careers in Physics." />
  <title>Industry | MCP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/mcp-shared.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<script type="text/babel">
const { useEffect, useMemo, useState } = React;

const NAV_LINKS = [
  { label:"Home", href:"../index.html" },
  { label:"Mentors", href:"./mentors.html" },
  { label:"Industry", href:"./industry.html" },
  { label:"Leadership", href:"./team.html" },
  { label:"News", href:"./news.html" },
  { label:"Contact", href:"./contact.html" },
];

const EXTERNAL_LINKS = {
  mentee: "https://forms.gle/zkuoy8HGdec81Y5o8",
  mentor: "mailto:mcp.superuser@gmail.com?subject=MCP%20Mentor%20Interest",
  giving: "https://donate.wm.edu/mentoring-for-careers-in-physics-green-space-renovation",
  linkedin: "https://www.linkedin.com/company/wmmcp",
  instagram: "https://www.instagram.com/wm_mcp",
};
const CURRENT_YEAR = new Date().getFullYear();
const ROOT = "..";
const FILTER_ORDER = ["All", "Industry", "Government", "National Lab", "Academia"];
const SECTOR_OVERRIDES = {
  "Arcfield": "Industry",
  "Athena Theatrical": "Industry",
  "BAE Systems": "Industry",
  "Calspan": "Industry",
  "Capital One": "Industry",
  "Case Western University": "Academia",
  "Christopher Newport University": "Academia",
  "Department of Defense": "Government",
  "Fannie Mae": "Industry",
  "Honeywell": "Industry",
  "Independent AI/ML-at-Scale Expert": "Independent",
  "Institute for Defense Analyses": "Government",
  "ivWatch LLC": "Industry",
  "Jefferson Lab": "National Lab",
  "KLA Corporation": "Industry",
  "Klaco Ventures": "Independent",
  "Luna Innovations": "Industry",
  "Micron Technology": "Industry",
  "Microsoft": "Industry",
  "MITRE": "Government",
  "NASA": "Government",
  "NASA Langley Research Center": "Government",
  "ProCure Treatment Centers": "Industry",
  "Psionic Technologies": "Industry",
  "Sandia National Laboratories": "National Lab",
  "Savannah River National Laboratory": "National Lab",
  "Self-Employed": "Independent",
  "U.S. Army Research Laboratory": "National Lab",
  "U.S. Naval Research Laboratory": "National Lab",
  "Varda Space Industries": "Industry",
  "Whisker Labs": "Industry",
};

function rootPath(relativePath = "") {
  const cleanPath = String(relativePath || "")
    .replace(/^\/+/, "")
    .replace(/^\.\//, "");
  return `${ROOT}/${cleanPath}`;
}

function assetPath(value = "") {
  if (!value) {
    return "";
  }

  if (/^(https?:)?\/\//i.test(value) || /^(mailto:|tel:|#|data:)/i.test(value)) {
    return value;
  }

  return rootPath(value);
}

async function loadJson(fileName) {
  const response = await fetch(rootPath(`data/${fileName}`));
  if (!response.ok) {
    throw new Error(`Could not load ${fileName}`);
  }
  return response.json();
}

function normalizeOrgName(value = "") {
  return String(value)
    .toLowerCase()
    .replace(/&/g, "and")
    .replace(/[^a-z0-9]+/g, " ")
    .trim();
}

function monogram(value = "") {
  const ignored = new Set([
    "and",
    "at",
    "for",
    "in",
    "of",
    "the",
    "to",
    "llc",
    "inc",
    "corp",
    "corporation",
    "national",
    "research",
    "center",
  ]);

  const parts = String(value)
    .replace(/&/g, " ")
    .replace(/[^a-z0-9\s]/gi, " ")
    .split(/\s+/)
    .filter(Boolean);

  const significant = parts.filter((part) => !ignored.has(part.toLowerCase()));
  const source = significant.length ? significant : parts;

  return source
    .slice(0, 2)
    .map((part) => part.charAt(0).toUpperCase())
    .join("");
}

function companySector(name = "") {
  return SECTOR_OVERRIDES[name] || "Industry";
}

function websiteHost(value = "") {
  if (!value) {
    return "";
  }

  try {
    return new URL(value).hostname.replace(/^www\./, "");
  } catch (error) {
    return value.replace(/^https?:\/\//, "").replace(/^www\./, "").replace(/\/$/, "");
  }
}

function mentorSummary(company) {
  if (!company.mentors.length) {
    return "This organization is part of the MCP network.";
  }

  if (company.mentors.length === 1) {
    return `1 MCP mentor works at ${company.name}.`;
  }

  return `${company.mentors.length} MCP mentors work across ${company.name}.`;
}

function buildCompanyDirectory(companies = [], mentors = []) {
  return companies
    .map((company) => {
      const organizationKeys = new Set(
        [company.name, ...(company.aliases || [])].map((value) => normalizeOrgName(value)),
      );
      const matchedMentors = mentors
        .filter((mentor) =>
          (mentor.organizations || []).some((organization) =>
            organizationKeys.has(normalizeOrgName(organization)),
          ),
        )
        .map((mentor) => mentor.name)
        .sort((left, right) => left.localeCompare(right));

      return {
        ...company,
        image: assetPath(company.image),
        mentors: [...new Set(matchedMentors)],
        sector: companySector(company.name),
        websiteHost: websiteHost(company.website),
      };
    })
    .sort((left, right) => left.name.localeCompare(right.name));
}

function Nav() {
  const [open, setOpen] = useState(false);
  return (
    <>
      <nav className="nav">
        <div className="nav-inner">
          <a className="brand" href="../index.html">
            <div className="brand-mark">MCP</div>
            <div className="brand-text"><strong>Mentoring for Careers in Physics</strong><small>William &amp; Mary</small></div>
          </a>
          <div className="nav-links">
            {NAV_LINKS.map(l => <a key={l.label} className={`nav-link${l.label==="Industry"?" active":""}`} href={l.href}>{l.label}</a>)}
          </div>
          <div className="nav-actions">
            <a className="nav-join" href={EXTERNAL_LINKS.mentee} target="_blank" rel="noreferrer">Join</a>
            <a className="nav-give" href={EXTERNAL_LINKS.giving} target="_blank" rel="noreferrer">Give</a>
            <button className="nav-hamburger" onClick={() => setOpen(o=>!o)} aria-label="Menu">
              <svg width="18" height="14" viewBox="0 0 18 14" fill="none"><rect width="18" height="2" rx="1" fill="currentColor"/><rect y="6" width="18" height="2" rx="1" fill="currentColor"/><rect y="12" width="18" height="2" rx="1" fill="currentColor"/></svg>
            </button>
          </div>
        </div>
      </nav>
      <div className={`nav-mobile ${open?"open":""}`}>
        {NAV_LINKS.map(l => <a key={l.label} href={l.href} onClick={() => setOpen(false)}>{l.label}</a>)}
        <div className="nav-mobile-actions">
          <a className="btn btn-ghost btn-sm" href={EXTERNAL_LINKS.mentee} target="_blank" rel="noreferrer">Join</a>
          <a className="btn btn-primary btn-sm" href={EXTERNAL_LINKS.giving} target="_blank" rel="noreferrer">Give</a>
        </div>
      </div>
    </>
  );
}

function Footer() {
  return (
    <footer className="footer">
      <div className="shell">
        <div className="footer-grid">
          <div>
            <a className="brand" href="../index.html" style={{marginBottom:"0.9rem",display:"inline-flex"}}>
              <div className="brand-mark">MCP</div>
              <div className="brand-text"><strong>Mentoring for Careers in Physics</strong><small>William &amp; Mary</small></div>
            </a>
            <p style={{fontSize:"0.88rem",color:"var(--muted)",lineHeight:1.65,maxWidth:"28ch",marginTop:"0.75rem"}}>Connecting undergraduate students with accomplished mentors across research, industry, and government.</p>
          </div>
          <div><div className="footer-heading">Explore</div><div className="footer-links">{NAV_LINKS.map(l=><a key={l.label} href={l.href}>{l.label}</a>)}</div></div>
          <div><div className="footer-heading">Get involved</div><div className="footer-links"><a href={EXTERNAL_LINKS.mentee} target="_blank" rel="noreferrer">Join as a student</a><a href={EXTERNAL_LINKS.mentor}>Become a mentor</a><a href={EXTERNAL_LINKS.giving} target="_blank" rel="noreferrer">Give to MCP</a></div></div>
          <div><div className="footer-heading">Connect</div><div className="footer-links"><a href={EXTERNAL_LINKS.linkedin} target="_blank" rel="noreferrer">LinkedIn</a><a href={EXTERNAL_LINKS.instagram} target="_blank" rel="noreferrer">Instagram</a><a href="mailto:mcp.superuser@gmail.com">mcp.superuser@gmail.com</a></div></div>
        </div>
        <div className="footer-base"><p>Mentoring for Careers in Physics · William &amp; Mary</p><p>© {CURRENT_YEAR} William &amp; Mary</p></div>
      </div>
    </footer>
  );
}

function CompanyCard({ company, linked }) {
  const content = (
    <>
      <div>
        <div className="company-sector">{company.sector}</div>
        <div style={{ marginTop:"1rem" }}>
          {company.image
            ? <div className="company-logo-wrap"><img src={company.image} alt={`${company.name} logo`} /></div>
            : <div className="company-monogram" aria-hidden="true">{monogram(company.name)}</div>
          }
        </div>
      </div>
      <div className="company-name">{company.name}</div>
      <div className="company-desc">
        {mentorSummary(company)}
        {company.websiteHost ? ` Visit ${company.websiteHost} for the official homepage.` : " Official homepage not listed in the current MCP data."}
      </div>
      <div style={{ marginTop:"auto" }}>
        <div style={{ fontSize:"0.72rem", fontWeight:600, color:"var(--wine-mid)", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:"0.4rem" }}>MCP Mentors</div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:"0.4rem" }}>
          {company.mentors.length
            ? company.mentors.map((mentor) => (
                <span key={mentor} style={{ fontSize:"0.78rem", background:"var(--blush)", color:"var(--wine)", padding:"0.28rem 0.65rem", borderRadius:"999px", fontWeight:500 }}>{mentor}</span>
              ))
            : <span style={{ fontSize:"0.82rem", color:"var(--muted)" }}>Mentor listing coming soon.</span>
          }
        </div>
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:"0.35rem", fontSize:"0.82rem", fontWeight:600, color:"var(--wine)" }}>
        {linked ? "Visit homepage →" : "Official homepage unavailable"}
      </div>
    </>
  );

  if (!linked) {
    return <article className="company-card">{content}</article>;
  }

  return (
    <a className="company-card" href={company.website} target="_blank" rel="noreferrer noopener" style={{ textDecoration:"none" }}>
      {content}
    </a>
  );
}

function App() {
  const [filter, setFilter] = useState("All");
  const [directory, setDirectory] = useState([]);
  const [status, setStatus] = useState({ loading:true, error:"" });

  useEffect(() => {
    let active = true;

    async function loadDirectory() {
      try {
        const [companies, mentors] = await Promise.all([
          loadJson("companies.json"),
          loadJson("mentors.json"),
        ]);

        if (!active) {
          return;
        }

        setDirectory(buildCompanyDirectory(companies, mentors));
        setStatus({ loading:false, error:"" });
      } catch (error) {
        if (!active) {
          return;
        }

        setStatus({ loading:false, error:"Could not load the organization directory right now." });
      }
    }

    loadDirectory();

    return () => {
      active = false;
    };
  }, []);

  const linkedCompanies = useMemo(
    () => directory.filter((company) => company.website),
    [directory],
  );
  const independentCompanies = useMemo(
    () => directory.filter((company) => !company.website),
    [directory],
  );
  const availableFilters = useMemo(
    () => FILTER_ORDER.filter((sector) => sector === "All" || linkedCompanies.some((company) => company.sector === sector)),
    [linkedCompanies],
  );
  const filtered = useMemo(
    () => (filter === "All" ? linkedCompanies : linkedCompanies.filter((company) => company.sector === filter)),
    [filter, linkedCompanies],
  );
  const representedSectors = new Set(linkedCompanies.map((company) => company.sector)).size;
  const mentorCount = new Set(linkedCompanies.flatMap((company) => company.mentors)).size;

  return (
    <>
      <Nav />
      <main>
        <section className="page-hero">
          <div className="shell">
            <div className="page-hero-grid">
              <div>
                <span className="kicker">Partner Organizations</span>
                <h1>Where mentors work.</h1>
                <p style={{fontSize:"1rem",color:"var(--muted)",lineHeight:1.7,maxWidth:"46ch",marginTop:"1rem"}}>This page now pulls from the full MCP organization directory, including labs, companies, agencies, and universities represented across the mentor network.</p>
              </div>
              <div className="hero-stat-card">
                <span className="kicker">Network</span>
                <div className="metric"><strong>{linkedCompanies.length}</strong><span>Organizations with homepage links</span></div>
                <div className="metric"><strong>{representedSectors}</strong><span>Sectors represented</span></div>
                <div className="metric"><strong>{mentorCount}</strong><span>Mentors mapped to organizations</span></div>
              </div>
            </div>
          </div>
        </section>

        <section className="section">
          <div className="shell">
            <div className="section-head">
              <div>
                <span className="kicker">Official Organization Directory</span>
                <h2>All linked organizations in MCP.</h2>
              </div>
              <div style={{fontSize:"0.88rem",color:"var(--muted)"}}>{filtered.length} shown</div>
            </div>

            {status.loading ? (
              <div className="empty-state">Loading organizations and mentor matches…</div>
            ) : status.error ? (
              <div className="empty-state">{status.error}</div>
            ) : (
              <>
                <div className="filter-row">
                  {availableFilters.map((sector) => <button key={sector} className={`filter-chip${filter===sector?" active":""}`} onClick={() => setFilter(sector)}>{sector}</button>)}
                </div>
                {filtered.length ? (
                  <div className="company-grid">
                    {filtered.map((company) => <CompanyCard key={company.name} company={company} linked />)}
                  </div>
                ) : (
                  <div className="empty-state">No organizations matched that filter.</div>
                )}
              </>
            )}
          </div>
        </section>

        {!status.loading && !status.error && independentCompanies.length ? (
          <section className="section section-soft">
            <div className="shell">
              <div className="section-head">
                <div>
                  <span className="kicker">Independent Practices</span>
                  <h2>Consulting and self-employed mentors.</h2>
                </div>
                <div style={{fontSize:"0.88rem",color:"var(--muted)",maxWidth:"30ch",textAlign:"right"}}>These entries are part of the MCP network, but the current data does not include an official company homepage or logo.</div>
              </div>
              <div className="company-grid">
                {independentCompanies.map((company) => <CompanyCard key={company.name} company={company} linked={false} />)}
              </div>
            </div>
          </section>
        ) : null}

        <section className="section section-soft">
          <div className="shell">
            <div className="cta-panel" style={{background:"linear-gradient(135deg,var(--wine),#6b4e58)",color:"white",border:"none"}}>
              <div>
                <span className="kicker kicker-light">Work at one of these organizations?</span>
                <h2 style={{color:"white",maxWidth:"18ch",marginBottom:"1rem"}}>Become a mentor.</h2>
                <p style={{color:"rgba(255,255,255,0.7)",lineHeight:1.7,maxWidth:"46ch",fontSize:"0.95rem"}}>If you're an alumna or professional in physics or engineering, we'd love to have you join the MCP mentor network.</p>
                <div className="cta-actions">
                  <a className="btn" href="./contact.html" style={{background:"white",color:"var(--wine)",fontWeight:700}}>Get in touch</a>
                  <a className="btn" style={{background:"rgba(255,255,255,0.12)",color:"white",border:"1px solid rgba(255,255,255,0.28)"}} href="./mentors.html">Browse mentors</a>
                </div>
              </div>
              <div>
                <img src="../assets/images/live-site/clearweb/assets/annual_celebration.png" alt="MCP celebration"
                  style={{borderRadius:"var(--r-xl)",width:"220px",height:"180px",objectFit:"cover",boxShadow:"0 24px 60px rgba(0,0,0,0.25)",border:"2px solid rgba(255,255,255,0.15)"}} />
              </div>
            </div>
          </div>
        </section>
      </main>
      <Footer />
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
